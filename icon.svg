<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#3b82f6" stroke-opacity="0.12" stroke-width="1">
    <path d="M0 128 H512 M0 256 H512 M0 384 H512"/>
    <path d="M128 0 V512 M256 0 V512 M384 0 V512"/>
  </g>
  <!-- glowing C with bracket -->
  <g filter="url(#glow)">
    <path d="M 340 160 A 110 110 0 1 0 340 352"
          stroke="url(#glyph)" stroke-width="36" stroke-linecap="round" fill="none"/>
    <circle cx="360" cy="256" r="14" fill="#22d3ee"/>
  </g>
</svg>
